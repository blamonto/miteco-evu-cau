version: "3.9"

services:
  miteco-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wildsquare-miteco
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - miteco-cache:/tmp/miteco-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  miteco-cache:
